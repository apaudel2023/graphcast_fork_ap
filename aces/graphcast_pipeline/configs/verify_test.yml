# verify_test.yml — single forecast verification with analysis
#
# Usage:
#   sbatch submit.sh --config verify_test.yml
#   python main.py --config verify_test.yml

run:
  mode: "verify"

verification:
  # init_time: forecast start date. Predictions begin at this date/hour.
  # Formats: "YYYY-MM-DD" (defaults to 00Z) or "YYYY-MM-DD HH:MM"
  # ERA5 inputs are automatically fetched for t-12h and t-6h before init_time.
  init_time: "2024-01-01"
  rollout_steps: 4                   # 4 x 6h = 24h

analysis:
  enabled: true
  metrics: true
  plots: true
  animations: true
  crop_preview: true                 # side-by-side global vs cropped with red box
  levels: null                       # null = all levels
  fps: 2
  cmap: "viridis"
  residual_cmap: "RdBu_r"
